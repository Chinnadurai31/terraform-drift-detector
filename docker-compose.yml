version: '3.8'

services:
  backend:
    build: ./backend
    container_name: tf-visualizer-backend
    ports:
      - "7070:7070"
    environment:
      - STATE_SOURCE=${STATE_SOURCE:-local}
      - STATE_PATH=${STATE_PATH:-/data/terraform.tfstate}
      - STATE_BUCKET=${STATE_BUCKET}
      - STATE_KEY=${STATE_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AUTO_RELOAD=${AUTO_RELOAD:-true}
      - PORT=7070
    volumes:
      - ./data:/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7070/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: tf-visualizer-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:7070
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  data:
